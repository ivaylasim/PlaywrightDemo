name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    env:
      HOME: /root
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: npm ci
    - name: Run Playwright tests
      run: npx playwright test
      env:
        API_KEY: ${{ secrets.API_KEY }}
    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
    - name: Upload Allure results
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: allure-results
        path: allure-results/
        retention-days: 30

  allure-report:
    needs: test
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
    - name: Download Allure results
      uses: actions/download-artifact@v4
      with:
        name: allure-results
        path: allure-results

    - name: Get previous Allure history
      uses: actions/checkout@v4
      continue-on-error: true
      with:
        ref: gh-pages
        path: gh-pages

    - name: Restore history
      run: |
        mkdir -p allure-results/history
        if [ -d gh-pages/history ]; then cp -r gh-pages/history/. allure-results/history/; fi

    - name: Add Allure metadata
      run: |
        mkdir -p allure-results
        cat > allure-results/executor.json << 'EOF'
        {
          "name": "GitHub Actions",
          "type": "github",
          "url": "${{ github.server_url }}",
          "buildOrder": ${{ github.run_number }},
          "buildName": "GitHub Actions #${{ github.run_number }}",
          "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
          "reportName": "Playwright Allure Report"
        }
        EOF
        cat > allure-results/environment.properties << 'EOF'
        Playwright.Version=1.59.1
        OS=Ubuntu 24.04 (noble) container
        Execution=GitHub Actions CI
        Browsers=Chromium, Firefox, WebKit
        Base.URL.API=https://reqres.in
        Base.URL.UI=https://www.shu.bg/students/razpisi-i-grafici/
        EOF

    - name: Generate Allure report
      run: |
        npm install -g allure-commandline
        allure generate allure-results --clean -o allure-report

    - name: Publish to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: allure-report